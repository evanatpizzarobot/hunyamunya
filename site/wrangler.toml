# Cloudflare Pages configuration. Spec §1, §8.6.
# Staging preview URL is auto-generated by CF; the production domain points to
# hunyamunyarecords.com once DNS cuts over.

name = "hunyamunyarecords"
compatibility_date = "2026-04-22"
pages_build_output_dir = ".next"

# Forms/submissions routing (Pages Functions). Implemented in app/api/contact/route.ts.
# R2 bucket binding name is `HMR_MEDIA` (bucket name in the CF dashboard).
# [[r2_buckets]]
# binding = "HMR_MEDIA"
# bucket_name = "hmr-media"

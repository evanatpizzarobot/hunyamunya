name: Build & deploy to hunyamunyarecords.com
on:
  push: { branches: [main] }
  workflow_dispatch:

# Auto-deploy pipeline replacing the old cPanel Git Version Control path.
# On every push to main (and on manual dispatch), this workflow builds the
# Next.js static export and syncs `site/out/` directly to the NetActuate
# cPanel over FTPS. No more manual zip uploads, no more cPanel "Update from
# Remote" click, no more diverging-branch errors.
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   FTP_HOST      - cPanel FTP hostname (e.g. server.netactuate.com or
#                   ftp.hunyamunyarecords.com). Shown in cPanel under
#                   "FTP Accounts" -> Configure FTP Client -> FTP Server.
#   FTP_USER      - cPanel FTP username (often matches the cPanel account,
#                   e.g. hmrecord, or hmrecord@hunyamunyarecords.com).
#   FTP_PASSWORD  - The password for that FTP user. Recommended: create a
#                   dedicated FTP account in cPanel -> FTP Accounts rather
#                   than reusing the main cPanel password.
#
# SamKirkland/FTP-Deploy-Action does an incremental sync using a state file
# it writes to the server, so first deploy uploads everything and subsequent
# deploys only push changed files.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build static export
        working-directory: site
        run: npm run build

      - name: Run postbuild
        working-directory: site
        run: npm run postbuild

      - name: Stage .htaccess into build output
        run: |
          set -eu
          cp site/public/.htaccess site/out/.htaccess

      - name: Sync to hunyamunyarecords.com over FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./site/out/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

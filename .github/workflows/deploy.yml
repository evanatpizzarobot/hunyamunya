name: Build & deploy to hunyamunyarecords.com
on:
  push: { branches: [main] }
  workflow_dispatch:

# Auto-deploy pipeline for the static Next.js export. On every push to `main`
# (and on manual dispatch), this workflow:
#   1. Builds the static export under `site/out/`.
#   2. Stamps BUILD_ID.txt with the commit SHA for post-deploy verification.
#   3. Injects the DEPLOY_TOKEN secret into the fix-perms.php chmod endpoint
#      that ships with the build.
#   4. Mirrors `site/out/` to cPanel public_html via FTPS using `lftp`.
#   5. Runs `chmod -R 0755 /` inside the same lftp session as a primary
#      perm-correction pass.
#   6. Calls the /fix-perms.php endpoint as a belt-and-suspenders pass that
#      runs as the filesystem owner via PHP-FPM (bypasses any FTP server
#      SITE CHMOD restrictions).
#   7. Smoke-tests the live site: verifies BUILD_ID.txt matches the deploying
#      SHA, verifies a handful of page URLs, and verifies the /_next/ CSS
#      referenced by the homepage is actually fetchable (the exact class of
#      failure that bit us once and went undetected).
#
# Any failure in steps 4-7 turns the run red in Actions so a silently-broken
# deploy can't stay live. Recovery paths are documented in docs/LAUNCH.md
# Phase 6 "Troubleshooting".
#
# FTP account setup in cPanel: FTP account's Directory MUST be
# `/home/<cpanel-user>/public_html` with no suffix, so the FTP root maps
# directly onto the web-served directory.
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   FTP_HOST       - cPanel FTP hostname.
#   FTP_USER       - Full FTP username, e.g. deploy@hunyamunyarecords.com.
#   FTP_PASSWORD   - Password for that FTP user.
#   DEPLOY_TOKEN   - Any random 32+ char string. Used as a shared secret
#                    between the workflow and fix-perms.php so the chmod
#                    endpoint is not publicly callable.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build static export
        working-directory: site
        run: npm run build

      - name: Run postbuild
        working-directory: site
        run: npm run postbuild

      - name: Stage .htaccess and BUILD_ID into build output
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          cp site/public/.htaccess site/out/.htaccess
          echo "$GITHUB_SHA" > site/out/BUILD_ID.txt

      - name: Inject DEPLOY_TOKEN into fix-perms.php
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -eu
          if [ -z "${DEPLOY_TOKEN:-}" ]; then
            echo "::error::DEPLOY_TOKEN repo secret is not set. Add it in Settings -> Secrets and variables -> Actions. Any random 32+ char string works."
            exit 1
          fi
          # Use python for safe replacement (avoids sed delimiter escaping
          # issues if the token contains /, &, or other sed metachars).
          python3 -c "
          import os, sys
          path = 'site/out/fix-perms.php'
          with open(path, 'r') as f: src = f.read()
          token = os.environ['DEPLOY_TOKEN']
          if '__DEPLOY_TOKEN__' not in src:
              sys.exit('placeholder missing in fix-perms.php')
          with open(path, 'w') as f: f.write(src.replace('__DEPLOY_TOKEN__', token))
          "

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y lftp

      - name: Deploy via FTPS with lftp (mirror + recursive chmod)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -eu
          cd site/out

          lftp -c "
            set ssl:verify-certificate no;
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ftp:passive-mode on;
            set net:timeout 30;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 4;
            open -u \"$FTP_USER\",\"$FTP_PASSWORD\" \"$FTP_HOST\";
            mirror --reverse --verbose --only-newer --exclude-glob .git* --exclude-glob node_modules --exclude-glob .DS_Store . /;
            chmod -R 0755 /;
            bye;
          "

      - name: Belt-and-suspenders chmod via PHP endpoint
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -eu
          RESPONSE="$(curl -fsS --max-time 60 -H "X-Deploy-Token: $DEPLOY_TOKEN" "https://www.hunyamunyarecords.com/fix-perms.php")"
          echo "PHP chmod endpoint: $RESPONSE"
          case "$RESPONSE" in
            ok\ *) ;;
            *) echo "::error::fix-perms.php did not return an ok payload. Response was: $RESPONSE"; exit 1 ;;
          esac

      - name: Smoke test live site
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          BASE="https://www.hunyamunyarecords.com"

          echo "--- BUILD_ID check ---"
          LIVE_SHA="$(curl -fsS --max-time 30 "$BASE/BUILD_ID.txt" | tr -d '[:space:]')"
          echo "Expected: $GITHUB_SHA"
          echo "Live:     $LIVE_SHA"
          if [ "$LIVE_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::BUILD_ID mismatch. The live site is still serving an older build, which means the FTPS upload did not overwrite live files."
            exit 1
          fi

          echo "--- HTTP status checks ---"
          for path in "/" "/catalog" "/artists/rykard" "/news"; do
            CODE="$(curl -s -o /dev/null -w '%{http_code}' "$BASE$path")"
            echo "$CODE  $path"
            if [ "$CODE" != "200" ] && [ "$CODE" != "301" ]; then
              echo "::error::Smoke test failed: $path returned $CODE (expected 200 or 301)"
              exit 1
            fi
          done

          echo "--- Asset perms check ---"
          CSS_PATH="$(curl -fsS "$BASE/" | grep -oE '/_next/static/css/[a-f0-9]+\.css' | head -n 1)"
          if [ -z "$CSS_PATH" ]; then
            echo "::error::Could not find a /_next/static/css/*.css reference in the served homepage."
            exit 1
          fi
          CSS_CODE="$(curl -s -o /dev/null -w '%{http_code}' "$BASE$CSS_PATH")"
          echo "$CSS_CODE  $CSS_PATH"
          if [ "$CSS_CODE" != "200" ]; then
            echo "::error::Stylesheet returned $CSS_CODE. Apache likely cannot read /_next/ (perms issue). See docs/LAUNCH.md Phase 6 troubleshooting."
            exit 1
          fi

          echo "--- All smoke checks passed ---"

name: Build & deploy to hunyamunyarecords.com
on:
  push: { branches: [main] }
  workflow_dispatch:

# Auto-deploy pipeline for the static Next.js export. On every push to `main`
# (and on manual dispatch):
#   1. Build the static export under `site/out/`.
#   2. Stamp BUILD_ID.txt with the commit SHA for post-deploy verification.
#   3. Rsync `site/out/` to cPanel `public_html` over SSH using a key-based
#      login. Rsync preserves file perms from the Linux runner (0644 files,
#      0755 dirs), so Apache-friendly perms are the default — no post-upload
#      chmod dance required.
#   4. Smoke-test the live site: confirm BUILD_ID.txt matches the deploying
#      SHA, hit a few URLs, verify the CSS referenced by the homepage
#      actually returns 200.
#
# Why SSH/rsync over FTP/FTPS: pure-ftpd on this server's FTP sub-accounts
# kept returning "421 Home directory not available" after the first clean
# deploy, regardless of sub-account perms or path. SSH is a completely
# different daemon (port 22, OpenSSH), bypasses every FTP quirk, and rsync
# gives us incremental transfer + perm preservation for free.
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   SSH_HOST         - cPanel server hostname, e.g. hunyamunyarecords.com
#   SSH_USER         - cPanel username, e.g. hmrecords
#   SSH_PRIVATE_KEY  - Private half of the key pair whose public half is
#                      authorized in cPanel -> SSH Access. Include the
#                      BEGIN/END header lines.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build static export
        working-directory: site
        run: npm run build

      - name: Run postbuild
        working-directory: site
        run: npm run postbuild

      - name: Stage .htaccess and BUILD_ID into build output
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          cp site/public/.htaccess site/out/.htaccess
          echo "$GITHUB_SHA" > site/out/BUILD_ID.txt

      - name: Install SSH key and detect SSH port
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          # cPanel hosts often expose SSH on a non-standard port. Probe 22
          # first, then cPanel's common alternates. Accept SSH_PORT secret
          # as an override.
          PORTS="22 2222 2083 22022"
          if [ -n "${SSH_PORT:-}" ]; then
            PORTS="$SSH_PORT"
          fi
          FOUND_PORT=""
          for p in $PORTS; do
            echo "probing $SSH_HOST:$p"
            if ssh-keyscan -T 5 -p "$p" -H "$SSH_HOST" 2>&1 | tee -a ~/.ssh/known_hosts | grep -q "ssh-"; then
              echo "✓ SSH responded on port $p"
              FOUND_PORT="$p"
              break
            fi
          done
          if [ -z "$FOUND_PORT" ]; then
            echo "::error::Could not reach SSH on any of: $PORTS. If your host uses a different port, add an SSH_PORT secret."
            exit 1
          fi
          echo "SSH_PORT_RESOLVED=$FOUND_PORT" >> "$GITHUB_ENV"
          chmod 644 ~/.ssh/known_hosts

      - name: Sync site/out to cPanel via rsync over SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -eu
          rsync -avz \
            --chmod=D0755,F0644 \
            --exclude '.git*' \
            --exclude 'node_modules/' \
            --exclude '.DS_Store' \
            -e "ssh -i ~/.ssh/id_deploy -p $SSH_PORT_RESOLVED -o StrictHostKeyChecking=accept-new" \
            site/out/ \
            "$SSH_USER@$SSH_HOST:/home/$SSH_USER/public_html/"

      - name: Smoke test live site
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          BASE="https://www.hunyamunyarecords.com"

          echo "--- BUILD_ID check ---"
          LIVE_SHA="$(curl -fsS --max-time 30 "$BASE/BUILD_ID.txt" | tr -d '[:space:]')"
          echo "Expected: $GITHUB_SHA"
          echo "Live:     $LIVE_SHA"
          if [ "$LIVE_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::BUILD_ID mismatch. The live site is still serving an older build."
            exit 1
          fi

          echo "--- HTTP status checks ---"
          for path in "/" "/catalog" "/artists/rykard" "/news"; do
            CODE="$(curl -s -o /dev/null -w '%{http_code}' "$BASE$path")"
            echo "$CODE  $path"
            if [ "$CODE" != "200" ] && [ "$CODE" != "301" ]; then
              echo "::error::Smoke test failed: $path returned $CODE"
              exit 1
            fi
          done

          echo "--- Asset perms check ---"
          CSS_PATH="$(curl -fsS "$BASE/" | grep -oE '/_next/static/css/[a-f0-9]+\.css' | head -n 1)"
          if [ -z "$CSS_PATH" ]; then
            echo "::error::Could not find a /_next/static/css/*.css reference in the served homepage."
            exit 1
          fi
          CSS_CODE="$(curl -s -o /dev/null -w '%{http_code}' "$BASE$CSS_PATH")"
          echo "$CSS_CODE  $CSS_PATH"
          if [ "$CSS_CODE" != "200" ]; then
            echo "::error::Stylesheet returned $CSS_CODE."
            exit 1
          fi

          echo "--- All smoke checks passed ---"

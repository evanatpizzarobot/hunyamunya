name: Build & deploy to hunyamunyarecords.com
on:
  push: { branches: [main] }
  workflow_dispatch:

# Auto-deploy pipeline using cPanel's own UAPI over HTTPS. This avoids every
# FTP/SSH quirk we hit on this NetActuate host (pure-ftpd 421 on sub-accounts,
# cPHulk blocks, SSH port unreachable from the outside). The cPanel web
# interface is demonstrably accessible on port 2083, so the UAPI endpoints
# there are as well.
#
# Flow on every push to `main`:
#   1. Build the Next.js static export into site/out/.
#   2. Stamp BUILD_ID.txt with the commit SHA for post-deploy verification.
#   3. Zip site/out/ into site.zip (contents at the archive root, not nested
#      under an `out/` folder).
#   4. Upload site.zip into /home/<user>/public_html/ via
#      UAPI Fileman::upload_files.
#   5. Extract site.zip in place via UAPI Fileman::extract. cPanel's extractor
#      writes files with standard umask perms (0644 files / 0755 dirs), so
#      Apache can read everything — no post-deploy chmod dance needed.
#   6. Delete site.zip via UAPI Fileman::fileop so the archive doesn't sit in
#      public_html as a publicly-readable artifact.
#   7. Smoke-test the live site (BUILD_ID match + key URLs + CSS reachable).
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   CPANEL_HOST        - e.g. hunyamunyarecords.com (no scheme, no port)
#   CPANEL_USER        - cPanel username, e.g. hmrecords
#   CPANEL_API_TOKEN   - Token created in cPanel -> Manage API Tokens
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build static export
        working-directory: site
        run: npm run build

      - name: Run postbuild
        working-directory: site
        run: npm run postbuild

      - name: Stage .htaccess and BUILD_ID into build output
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          cp site/public/.htaccess site/out/.htaccess
          echo "$GITHUB_SHA" > site/out/BUILD_ID.txt

      - name: Inject DEPLOY_TOKEN into PHP endpoints
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -eu
          if [ -z "${DEPLOY_TOKEN:-}" ]; then
            echo "::error::DEPLOY_TOKEN repo secret is not set. Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          python3 -c "
          import os
          token = os.environ['DEPLOY_TOKEN']
          for path in ('site/out/fix-perms.php', 'site/out/deploy-extract.php'):
              with open(path, 'r') as f: src = f.read()
              with open(path, 'w') as f: f.write(src.replace('__DEPLOY_TOKEN__', token))
          "

      - name: Zip build output
        run: |
          set -eu
          cd site/out
          zip -qr "$GITHUB_WORKSPACE/site.zip" .
          ls -lh "$GITHUB_WORKSPACE/site.zip"

      - name: Upload deploy-extract.php via cPanel UAPI
        env:
          HOST: ${{ secrets.CPANEL_HOST }}
          USER: ${{ secrets.CPANEL_USER }}
          TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          set -eu
          # Upload the extraction endpoint first. Subsequent deploys overwrite
          # it via the zip extraction itself, but we upload explicitly every
          # time in case a prior build was rolled back or the file was
          # removed manually.
          RESPONSE="$(curl -fsS --max-time 60 \
            -H "Authorization: cpanel $USER:$TOKEN" \
            -F "dir=/home/$USER/public_html" \
            -F "file-1=@site/out/deploy-extract.php" \
            "https://$HOST:2083/execute/Fileman/upload_files")"
          echo "upload extractor: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":1' || { echo "::error::extractor upload failed"; exit 1; }

      - name: Upload zip to public_html via cPanel UAPI
        env:
          HOST: ${{ secrets.CPANEL_HOST }}
          USER: ${{ secrets.CPANEL_USER }}
          TOKEN: ${{ secrets.CPANEL_API_TOKEN }}
        run: |
          set -eu
          RESPONSE="$(curl -fsS --max-time 600 \
            -H "Authorization: cpanel $USER:$TOKEN" \
            -F "dir=/home/$USER/public_html" \
            -F "file-1=@$GITHUB_WORKSPACE/site.zip" \
            "https://$HOST:2083/execute/Fileman/upload_files")"
          echo "upload zip: $RESPONSE"
          echo "$RESPONSE" | grep -q '"status":1' || { echo "::error::zip upload failed"; exit 1; }

      - name: Extract zip via PHP endpoint
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -eu
          RESPONSE="$(curl -fsS --max-time 300 \
            -H "X-Deploy-Token: $DEPLOY_TOKEN" \
            "https://www.hunyamunyarecords.com/deploy-extract.php")"
          echo "extract: $RESPONSE"
          case "$RESPONSE" in
            ok\ *) ;;
            *) echo "::error::deploy-extract.php did not return ok. Response: $RESPONSE"; exit 1 ;;
          esac

      - name: Smoke test live site
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          BASE="https://www.hunyamunyarecords.com"
          # Give cPanel's extractor a couple seconds to finalize writes.
          sleep 3

          echo "--- BUILD_ID check ---"
          LIVE_SHA="$(curl -fsS --max-time 30 "$BASE/BUILD_ID.txt" | tr -d '[:space:]')"
          echo "Expected: $GITHUB_SHA"
          echo "Live:     $LIVE_SHA"
          if [ "$LIVE_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::BUILD_ID mismatch. Live site is still serving older build."
            exit 1
          fi

          echo "--- HTTP status checks ---"
          for path in "/" "/catalog" "/artists/rykard" "/news"; do
            CODE="$(curl -s -o /dev/null -w '%{http_code}' "$BASE$path")"
            echo "$CODE  $path"
            if [ "$CODE" != "200" ] && [ "$CODE" != "301" ]; then
              echo "::error::Smoke test failed: $path returned $CODE"
              exit 1
            fi
          done

          echo "--- Asset perms check ---"
          CSS_PATH="$(curl -fsS "$BASE/" | grep -oE '/_next/static/css/[a-f0-9]+\.css' | head -n 1)"
          if [ -z "$CSS_PATH" ]; then
            echo "::error::No /_next/static/css/*.css reference found in homepage."
            exit 1
          fi
          CSS_CODE="$(curl -s -o /dev/null -w '%{http_code}' "$BASE$CSS_PATH")"
          echo "$CSS_CODE  $CSS_PATH"
          if [ "$CSS_CODE" != "200" ]; then
            echo "::error::Stylesheet returned $CSS_CODE."
            exit 1
          fi

          echo "--- All smoke checks passed ---"

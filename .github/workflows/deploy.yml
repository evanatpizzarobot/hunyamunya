name: Build & deploy to hunyamunyarecords.com
on:
  push: { branches: [main] }
  workflow_dispatch:

# Auto-deploy pipeline for the Next.js static export. Targets a dedicated
# NetActuate VPS (separate from the old cPanel shared host that fought us
# for hours on FTP/SSH). Build happens on the GitHub runner; the output is
# rsync'd to the VPS over SSH as the `deploy` user; nginx serves it.
#
# On every push to `main`:
#   1. Build site/out/.
#   2. Stamp BUILD_ID.txt with the commit SHA.
#   3. rsync site/out/ -> deploy@<VPS>:/var/www/hunyamunya/.
#   4. Smoke test against http://<VPS IP>/ — verifies BUILD_ID matches the
#      deploying SHA and key pages + CSS return 200.
#
# Required GitHub repo secrets:
#   SSH_HOST         - VPS IP or hostname (e.g. 208.111.40.106).
#   SSH_USER         - deploy user on the VPS (e.g. `deploy`).
#   SSH_PRIVATE_KEY  - private half of the key whose public half is in
#                      /home/deploy/.ssh/authorized_keys on the VPS.
#   SMOKE_BASE       - (optional) base URL for smoke tests. Defaults to
#                      http://$SSH_HOST when unset, so the first deploys
#                      test against the VPS IP before DNS cutover. Once
#                      DNS is moved to the VPS, set this to
#                      https://www.hunyamunyarecords.com.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build static export
        working-directory: site
        run: npm run build

      - name: Run postbuild
        working-directory: site
        run: npm run postbuild

      - name: Stage .htaccess and BUILD_ID into build output
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          cp site/public/.htaccess site/out/.htaccess
          echo "$GITHUB_SHA" > site/out/BUILD_ID.txt

      - name: Install SSH key
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          # Secret holds the private key base64-encoded so newlines/whitespace
          # can't be mangled by clipboard or the secret-store UI. Decode here.
          printf '%s' "$SSH_PRIVATE_KEY" | base64 -d > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          # Sanity check: the decoded file must look like an OpenSSH key.
          head -1 ~/.ssh/id_deploy | grep -q "BEGIN OPENSSH PRIVATE KEY" || {
            echo "::error::SSH_PRIVATE_KEY did not decode to a valid OpenSSH key. The secret should be the base64-encoded contents of /home/deploy/.ssh/github-deploy from the VPS."
            exit 1
          }
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          chmod 644 ~/.ssh/known_hosts

      - name: Rsync site/out to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -eu
          rsync -avz --delete \
            --chmod=D0755,F0644 \
            --exclude '.git*' \
            --exclude 'node_modules/' \
            --exclude '.DS_Store' \
            --exclude 'gd' \
            --exclude 'gd.txt' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new" \
            site/out/ \
            "$SSH_USER@$SSH_HOST:/var/www/hunyamunya/"

      - name: Smoke test live site
        env:
          GITHUB_SHA: ${{ github.sha }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SMOKE_BASE: ${{ secrets.SMOKE_BASE }}
        run: |
          set -eu
          BASE="${SMOKE_BASE:-http://$SSH_HOST}"
          echo "smoke base: $BASE"

          echo "--- BUILD_ID check ---"
          LIVE_SHA="$(curl -fsS --max-time 30 -k "$BASE/BUILD_ID.txt" | tr -d '[:space:]')"
          echo "Expected: $GITHUB_SHA"
          echo "Live:     $LIVE_SHA"
          if [ "$LIVE_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::BUILD_ID mismatch. Live is serving an older build."
            exit 1
          fi

          echo "--- HTTP status checks ---"
          for path in "/" "/catalog" "/artists/rykard" "/news"; do
            CODE="$(curl -s -k -o /dev/null -w '%{http_code}' "$BASE$path")"
            echo "$CODE  $path"
            if [ "$CODE" != "200" ] && [ "$CODE" != "301" ]; then
              echo "::error::$path returned $CODE"
              exit 1
            fi
          done

          echo "--- Asset perms check ---"
          CSS_PATH="$(curl -fsS -k "$BASE/" | grep -oE '/_next/static/css/[a-f0-9]+\.css' | head -n 1)"
          if [ -n "$CSS_PATH" ]; then
            CSS_CODE="$(curl -s -k -o /dev/null -w '%{http_code}' "$BASE$CSS_PATH")"
            echo "$CSS_CODE  $CSS_PATH"
            [ "$CSS_CODE" = "200" ] || { echo "::error::stylesheet returned $CSS_CODE"; exit 1; }
          fi

          echo "--- All smoke checks passed ---"

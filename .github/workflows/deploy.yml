name: Build & deploy to hunyamunyarecords.com
on:
  push: { branches: [main] }
  workflow_dispatch:

# Auto-deploy pipeline for the static Next.js export. On every push to `main`
# (and on manual dispatch):
#   1. Build the static export under `site/out/`.
#   2. Stamp BUILD_ID.txt with the commit SHA for post-deploy verification.
#   3. Inject DEPLOY_TOKEN into site/out/fix-perms.php so the in-build chmod
#      endpoint is callable only by this workflow.
#   4. Upload `site/out/` to cPanel public_html via FTPS (SamKirkland's
#      FTP-Deploy-Action — proven on this server's pure-ftpd config).
#   5. Call /fix-perms.php with the token; the PHP endpoint runs as the
#      filesystem owner and resets perms recursively (0755 for dirs, 0644
#      for files), sidestepping the cPanel FTP sub-account's restrictive
#      upload umask that otherwise 403s every subfolder.
#   6. Smoke-test the live site: confirm BUILD_ID.txt matches the deploying
#      SHA, confirm a few page URLs return 200/301, and confirm the CSS
#      referenced by the served homepage is actually fetchable (the exact
#      failure class that bit us on 2026-04-24).
#
# Any failure in steps 4-6 turns the run red in Actions so a silently
# broken deploy can't stay live. Recovery procedure: see docs/LAUNCH.md
# Phase 6 "Troubleshooting".
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   FTP_HOST       - cPanel FTP hostname.
#   FTP_USER       - Full FTP username, e.g. deploy@hunyamunyarecords.com.
#   FTP_PASSWORD   - Password for that FTP user.
#   DEPLOY_TOKEN   - Any random 32+ char string. Shared secret between
#                    workflow and fix-perms.php so the chmod endpoint is
#                    not publicly callable.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build static export
        working-directory: site
        run: npm run build

      - name: Run postbuild
        working-directory: site
        run: npm run postbuild

      - name: Stage .htaccess and BUILD_ID into build output
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          cp site/public/.htaccess site/out/.htaccess
          echo "$GITHUB_SHA" > site/out/BUILD_ID.txt

      - name: Inject DEPLOY_TOKEN into fix-perms.php
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -eu
          if [ -z "${DEPLOY_TOKEN:-}" ]; then
            echo "::error::DEPLOY_TOKEN repo secret is not set. Add it in Settings -> Secrets and variables -> Actions. Any random 32+ char string works."
            exit 1
          fi
          python3 -c "
          import os, sys
          path = 'site/out/fix-perms.php'
          with open(path, 'r') as f: src = f.read()
          token = os.environ['DEPLOY_TOKEN']
          if '__DEPLOY_TOKEN__' not in src:
              sys.exit('placeholder missing in fix-perms.php')
          with open(path, 'w') as f: f.write(src.replace('__DEPLOY_TOKEN__', token))
          "

      - name: Upload to public_html via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./site/out/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store

      - name: Reset file permissions via PHP chmod endpoint
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          set -eu
          # Apache/PHP-FPM can read PHP files even at 0600 perms (since
          # PHP-FPM runs as the filesystem owner), so fix-perms.php is
          # callable immediately after upload despite the umask problem
          # that affects static files. This is the step that unlocks
          # every 403 in one pass.
          RESPONSE="$(curl -fsS --max-time 60 --retry 3 --retry-delay 5 \
            -H "X-Deploy-Token: $DEPLOY_TOKEN" \
            "https://www.hunyamunyarecords.com/fix-perms.php")"
          echo "fix-perms.php: $RESPONSE"
          case "$RESPONSE" in
            ok\ *) ;;
            *) echo "::error::fix-perms.php did not return an 'ok' payload. Response was: $RESPONSE"; exit 1 ;;
          esac

      - name: Smoke test live site
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -eu
          BASE="https://www.hunyamunyarecords.com"

          echo "--- BUILD_ID check ---"
          LIVE_SHA="$(curl -fsS --max-time 30 "$BASE/BUILD_ID.txt" | tr -d '[:space:]')"
          echo "Expected: $GITHUB_SHA"
          echo "Live:     $LIVE_SHA"
          if [ "$LIVE_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::BUILD_ID mismatch. The live site is still serving an older build — the FTPS upload did not overwrite live files."
            exit 1
          fi

          echo "--- HTTP status checks ---"
          for path in "/" "/catalog" "/artists/rykard" "/news"; do
            CODE="$(curl -s -o /dev/null -w '%{http_code}' "$BASE$path")"
            echo "$CODE  $path"
            if [ "$CODE" != "200" ] && [ "$CODE" != "301" ]; then
              echo "::error::Smoke test failed: $path returned $CODE (expected 200 or 301)"
              exit 1
            fi
          done

          echo "--- Asset perms check ---"
          CSS_PATH="$(curl -fsS "$BASE/" | grep -oE '/_next/static/css/[a-f0-9]+\.css' | head -n 1)"
          if [ -z "$CSS_PATH" ]; then
            echo "::error::Could not find a /_next/static/css/*.css reference in the served homepage."
            exit 1
          fi
          CSS_CODE="$(curl -s -o /dev/null -w '%{http_code}' "$BASE$CSS_PATH")"
          echo "$CSS_CODE  $CSS_PATH"
          if [ "$CSS_CODE" != "200" ]; then
            echo "::error::Stylesheet returned $CSS_CODE. Apache likely cannot read /_next/. See docs/LAUNCH.md Phase 6 troubleshooting."
            exit 1
          fi

          echo "--- All smoke checks passed ---"
